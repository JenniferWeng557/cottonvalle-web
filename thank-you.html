<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank You | Cottonvalle</title>
  <meta name="robots" content="noindex,follow" />
  <style>
    :root{--bg:#f5efe4;--ink:#201f1c;--muted:#6b6257;--card:#fffaf1;--line:#e2d8c8;}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:32px}.card{max-width:760px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:28px;padding:52px;box-shadow:0 24px 70px rgba(32,31,28,.08)}
    h1{font-family:Georgia,serif;font-size:clamp(42px,7vw,72px);line-height:.95;margin:0 0 20px}.lead{font-size:20px;line-height:1.6;color:var(--muted);margin:0 0 30px}.actions{display:flex;gap:14px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:15px 24px;text-decoration:none;font-weight:800}.primary{background:#201f1c;color:#fff}.secondary{border:1px solid var(--line);color:#201f1c;background:#fff}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Thank you.</h1>
      <p class="lead">Your quote request has been received. Our team will review your bag type, quantity, artwork and delivery target, then reply within 24 hours.</p>
      <div class="actions">
        <a class="btn primary" href="/">Back to Home</a>
        <a class="btn secondary" href="/products.html">View Products</a>
      </div>
    </section>
  </main>
<script src="/quote-fix.js"></script></body>
</html>
